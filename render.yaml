# render.yaml — Render deployment config for full-scraper
#
# This file lives at the root of the full_scraper git repo.
# Render dashboard → New → Blueprint → select your repo.

services:
  - type: web
    name: full-scraper
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: standard
    healthCheckPath: /health
    disk:
      name: scraper-data
      mountPath: /var/data
      sizeGB: 10
    envVars:
      - key: API_KEY
        generateValue: true
      - key: START_YEAR
        value: "1940"
      - key: END_YEAR
        value: "2005"
      - key: PAGE_PAUSE
        value: "0.5"
      - key: PHASE0_PAUSE
        value: "1.5"
      - key: BATCH_SIZE
        value: "25"
      - key: PARALLEL_WORKERS
        value: "4"
      - key: TARGET_PEOPLE_DEFAULT
        value: "10400000"
      - key: HEARTBEAT_STALE_SECONDS
        value: "300"
      - key: PHASE2E_STALL_SECONDS
        value: "600"
      - key: STAGE1_BARRIER_POLL_SECONDS
        value: "30"
      - key: AUTO_RESUME
        value: "true"
      - key: DATA_DIR
        value: "/var/data"
